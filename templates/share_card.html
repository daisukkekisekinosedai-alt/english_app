{% extends "base.html" %}

{% block title %}共有カード - にゃんにゃんイングリッシュ{% endblock %}

{% block content %}
<section class="card">
    <p class="eyebrow">Share Card</p>
    <h1>共有カード</h1>
    <p class="lead small-lead">スクショではなく、画像化してそのまま共有できます。</p>
</section>

<section class="share-image-box share-image-box-large">
    <div class="share-image-header">
        <div>
            <h2>{{ user["display_name"] }} の今日の英語ログ</h2>
            <p class="muted">画像生成 → 共有シート → LINE という流れで使えます。</p>
        </div>
        <span class="share-badge">Image Share</span>
    </div>

    <div class="share-preview-frame share-preview-frame-large">
        <img src="{{ url_for('share_today_image_svg') }}" alt="共有カード画像">
    </div>

    <div class="hero-actions">
        <button
            class="button primary share-image-button"
            type="button"
            data-share-image-url="{{ url_for('share_today_image_svg') }}"
            data-share-filename="nyannyan_today_result.png"
            data-share-title="今日の英語ログを共有"
        >
            画像を共有（LINEなど）
        </button>

        <button
            class="button secondary download-image-button"
            type="button"
            data-download-image-url="{{ url_for('share_today_image_svg') }}"
            data-download-filename="nyannyan_today_result.png"
        >
            画像を保存
        </button>

        <a class="button secondary" href="{{ url_for('share_today') }}">テキスト共有へ</a>
    </div>
</section>
{% endblock %}
